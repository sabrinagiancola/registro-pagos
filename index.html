<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Pagos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        .header {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #667eea;
            font-size: 24px;
            margin-bottom: 15px;
        }
        .totales-container {
            display: grid;
            gap: 15px;
        }
        .totales-section {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 10px;
        }
        .totales-section h3 {
            font-size: 13px;
            color: #6c757d;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: 600;
        }
        .totales-section.compra {
            border-left: 4px solid #28a745;
        }
        .totales-section.venta {
            border-left: 4px solid #fd7e14;
        }
        .totales {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .total-item {
            text-align: center;
        }
        .total-label {
            font-size: 11px;
            color: #6c757d;
            margin-bottom: 3px;
        }
        .total-value {
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
        }
        .form-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #495057;
            font-size: 14px;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        textarea {
            resize: vertical;
            min-height: 60px;
        }
        .tipo-toggle {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }
        .tipo-btn {
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        .tipo-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        button {
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-reset {
            background: #dc3545;
            color: white;
            padding: 8px 16px;
            font-size: 14px;
            width: auto;
        }
        .btn-delete {
            background: #dc3545;
            color: white;
            padding: 6px 12px;
            font-size: 12px;
            width: auto;
            border-radius: 6px;
        }
        .historial {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .historial h2 {
            color: #667eea;
            font-size: 18px;
            margin-bottom: 15px;
        }
        .registro {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
            position: relative;
        }
        .registro.compra {
            border-left-color: #28a745;
        }
        .registro.venta {
            border-left-color: #fd7e14;
        }
        .registro-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .registro-header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .registro-tipo {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .registro-tipo.compra {
            background: #d4edda;
            color: #155724;
        }
        .registro-tipo.venta {
            background: #fff3cd;
            color: #856404;
        }
        .registro-fecha {
            font-size: 11px;
            color: #6c757d;
        }
        .registro-descripcion {
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }
        .registro-detalles {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            font-size: 14px;
        }
        .registro-monto {
            font-weight: bold;
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #6c757d;
        }
        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .calc-preview {
            background: #e7f3ff;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 14px;
            color: #004085;
            text-align: center;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 Registro de Pagos</h1>
            <div class="totales-container">
                <div class="totales-section compra">
                    <h3>📗 Compras USD</h3>
                    <div class="totales">
                        <div class="total-item">
                            <div class="total-label">Bs. Pagados</div>
                            <div class="total-value" id="compraBs">0.00</div>
                        </div>
                        <div class="total-item">
                            <div class="total-label">USD Recibidos</div>
                            <div class="total-value" id="compraUsd">$0.00</div>
                        </div>
                    </div>
                </div>
                <div class="totales-section venta">
                    <h3>📙 Ventas USD</h3>
                    <div class="totales">
                        <div class="total-item">
                            <div class="total-label">USD Pagados</div>
                            <div class="total-value" id="ventaUsd">$0.00</div>
                        </div>
                        <div class="total-item">
                            <div class="total-label">Bs. Recibidos</div>
                            <div class="total-value" id="ventaBs">0.00</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="form-card">
            <form id="pagoForm">
                <div class="tipo-toggle">
                    <div class="tipo-btn active" onclick="cambiarTipo('compra')">
                        📗 Compra USD
                    </div>
                    <div class="tipo-btn" onclick="cambiarTipo('venta')">
                        📙 Venta USD
                    </div>
                </div>

                <div class="form-group">
                    <label for="descripcion">Descripción</label>
                    <input type="text" id="descripcion" required placeholder="Ej: Cena, Gasolina, Mercado">
                </div>

                <div class="form-group">
                    <label for="monto" id="labelMonto">Monto en Bolívares (das)</label>
                    <input type="text" id="monto" required placeholder="Ej: 150.00" inputmode="decimal">
                </div>

                    <label for="tasa">Tasa de cambio (Bs/$)</label>
