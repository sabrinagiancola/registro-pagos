<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Pagos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        .header {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #667eea;
            font-size: 24px;
            margin-bottom: 15px;
        }
        .totales-container {
            display: grid;
            gap: 15px;
        }
        .totales-section {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 10px;
        }
        .totales-section h3 {
            font-size: 13px;
            color: #6c757d;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: 600;
        }
        .totales-section.compra {
            border-left: 4px solid #28a745;
        }
        .totales-section.venta {
            border-left: 4px solid #fd7e14;
        }
        .totales {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .total-item {
            text-align: center;
        }
        .total-label {
            font-size: 11px;
            color: #6c757d;
            margin-bottom: 3px;
        }
        .total-value {
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
        }
        .form-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #495057;
            font-size: 14px;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        textarea {
            resize: vertical;
            min-height: 60px;
        }
        .tipo-toggle {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }
        .tipo-btn {
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        .tipo-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        button {
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-reset {
            background: #dc3545;
            color: white;
            padding: 8px 16px;
            font-size: 14px;
            width: auto;
        }
        .btn-delete {
            background: #dc3545;
            color: white;
            padding: 6px 12px;
            font-size: 12px;
            width: auto;
            border-radius: 6px;
        }
        .historial {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .historial h2 {
            color: #667eea;
            font-size: 18px;
            margin-bottom: 15px;
        }
        .registro {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
            position: relative;
        }
        .registro.compra {
            border-left-color: #28a745;
        }
        .registro.venta {
            border-left-color: #fd7e14;
        }
        .registro-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .registro-header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .registro-tipo {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .registro-tipo.compra {
            background: #d4edda;
            color: #155724;
        }
        .registro-tipo.venta {
            background: #fff3cd;
            color: #856404;
        }
        .registro-fecha {
            font-size: 11px;
            color: #6c757d;
        }
        .registro-descripcion {
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }
        .registro-detalles {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            font-size: 14px;
        }
        .registro-monto {
            font-weight: bold;
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #6c757d;
        }
        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .calc-preview {
            background: #e7f3ff;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 14px;
            color: #004085;
            text-align: center;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 Registro de Pagos</h1>
            <div class="totales-container">
                <div class="totales-section compra">
                    <h3>📗 Compras USD</h3>
                    <div class="totales">
                        <div class="total-item">
                            <div class="total-label">Bs. Pagados</div>
                            <div class="total-value" id="compraBs">0.00</div>
                        </div>
                        <div class="total-item">
                            <div class="total-label">USD Recibidos</div>
                            <div class="total-value" id="compraUsd">$0.00</div>
                        </div>
                    </div>
                </div>
                <div class="totales-section venta">
                    <h3>📙 Ventas USD</h3>
                    <div class="totales">
                        <div class="total-item">
                            <div class="total-label">USD Pagados</div>
                            <div class="total-value" id="ventaUsd">$0.00</div>
                        </div>
                        <div class="total-item">
                            <div class="total-label">Bs. Recibidos</div>
                            <div class="total-value" id="ventaBs">0.00</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="form-card">
            <form id="pagoForm">
                <div class="tipo-toggle">
                    <div class="tipo-btn active" onclick="cambiarTipo('compra')">
                        📗 Compra USD
                    </div>
                    <div class="tipo-btn" onclick="cambiarTipo('venta')">
                        📙 Venta USD
                    </div>
                </div>

                <div class="form-group">
                    <label for="descripcion">Descripción</label>
                    <input type="text" id="descripcion" required placeholder="Ej: Cena, Gasolina, Mercado">
                </div>

                <div class="form-group">
                    <label for="monto" id="labelMonto">Monto en Bolívares (das)</label>
                    <input type="text" id="monto" required placeholder="Ej: 150.00" inputmode="decimal">
                </div>

                <div class="form-group">
                    <label for="tasa">Tasa de cambio (Bs/$)</label>
                    <input type="text" id="tasa" required placeholder="Ej: 36.50" inputmode="decimal">
                </div>

                <div id="calcPreview" class="calc-preview" style="display: none;"></div>

                <button type="submit" class="btn-primary">➕ Agregar Transacción</button>
            </form>
        </div>

        <div class="historial">
            <div class="header-flex">
                <h2>📋 Historial</h2>
                <button onclick="resetearDatos()" class="btn-reset">🔄 Resetear</button>
            </div>
            <div id="listaRegistros">
                <div class="empty-state">
                    <p>No hay registros aún.<br>Agrega tu primera transacción arriba.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let registros = JSON.parse(localStorage.getItem('registrosPagos')) || [];
        let tipoActual = 'compra';

        function formatearInput(valor) {
            // Remover todo excepto números, punto y coma
            valor = valor.replace(/[^\d.,]/g, '');
            
            // Reemplazar coma por punto
            valor = valor.replace(',', '.');
            
            // Permitir solo un punto decimal
            const partes = valor.split('.');
            if (partes.length > 2) {
                valor = partes[0] + '.' + partes.slice(1).join('');
            }
            
            return valor;
        }

        function formatearNumeroConSeparadores(num) {
            const partes = num.toString().split('.');
            partes[0] = partes[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            return partes.join('.');
        }

        // Event listeners para formatear inputs
        document.getElementById('monto').addEventListener('input', function(e) {
            let valor = formatearInput(e.target.value);
            e.target.value = valor;
            actualizarPreview();
        });

        document.getElementById('tasa').addEventListener('input', function(e) {
            let valor = formatearInput(e.target.value);
            e.target.value = valor;
            actualizarPreview();
        });

        function cambiarTipo(tipo) {
            tipoActual = tipo;
            
            // Actualizar botones
            document.querySelectorAll('.tipo-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Actualizar label
            const labelMonto = document.getElementById('labelMonto');
            if (tipo === 'compra') {
                labelMonto.textContent = 'Monto en Bolívares (das)';
            } else {
                labelMonto.textContent = 'Monto en Dólares (das)';
            }
            
            // Limpiar preview
            document.getElementById('calcPreview').style.display = 'none';
            
            // Actualizar preview si hay datos
            actualizarPreview();
        }

        function actualizarPreview() {
            const montoStr = document.getElementById('monto').value;
            const tasaStr = document.getElementById('tasa').value;
            const monto = parseFloat(montoStr);
            const tasa = parseFloat(tasaStr);
            const preview = document.getElementById('calcPreview');
            
            if (monto && tasa && !isNaN(monto) && !isNaN(tasa)) {
                let resultado;
                if (tipoActual === 'compra') {
                    resultado = monto / tasa;
                    preview.textContent = `Recibes: $${formatearNumero(resultado)}`;
                } else {
                    resultado = monto * tasa;
                    preview.textContent = `Recibes: Bs. ${formatearNumero(resultado)}`;
                }
                preview.style.display = 'block';
            } else {
                preview.style.display = 'none';
            }
        }

        function formatearNumero(num) {
            return num.toLocaleString('es-VE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function formatearFecha(fecha) {
            const opciones = { 
                year: 'numeric', 
                month: 'short', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            };
            return new Date(fecha).toLocaleDateString('es-VE', opciones);
        }

        function actualizarTotales() {
            let compraBs = 0, compraUsd = 0;
            let ventaUsd = 0, ventaBs = 0;
            
            registros.forEach(reg => {
                if (reg.tipo === 'compra') {
                    compraBs += reg.montoBs;
                    compraUsd += reg.montoUsd;
                } else {
                    ventaUsd += reg.montoUsd;
                    ventaBs += reg.montoBs;
                }
            });
            
            document.getElementById('compraBs').textContent = formatearNumero(compraBs);
            document.getElementById('compraUsd').textContent = '$' + formatearNumero(compraUsd);
            document.getElementById('ventaUsd').textContent = '$' + formatearNumero(ventaUsd);
            document.getElementById('ventaBs').textContent = formatearNumero(ventaBs);
        }

        function borrarRegistro(index) {
            if (confirm('¿Estás seguro de que quieres borrar esta transacción?')) {
                registros.splice(registros.length - 1 - index, 1);
                localStorage.setItem('registrosPagos', JSON.stringify(registros));
                actualizarTotales();
                renderizarHistorial();
            }
        }

        function renderizarHistorial() {
            const lista = document.getElementById('listaRegistros');
            
            if (registros.length === 0) {
                lista.innerHTML = '<div class="empty-state"><p>No hay registros aún.<br>Agrega tu primera transacción arriba.</p></div>';
                return;
            }

            lista.innerHTML = registros.map((reg, index) => `
                <div class="registro ${reg.tipo}">
                    <div class="registro-header">
                        <div class="registro-header-left">
                            <span class="registro-tipo ${reg.tipo}">${reg.tipo === 'compra' ? 'Compra' : 'Venta'}</span>
                            <span class="registro-fecha">${formatearFecha(reg.fecha)}</span>
                        </div>
                        <button class="btn-delete" onclick="borrarRegistro(${registros.length - 1 - index})">🗑️</button>
                    </div>
                    <div class="registro-descripcion">${reg.descripcion}</div>
                    <div class="registro-detalles">
                        <div class="registro-monto">Bs. ${formatearNumero(reg.montoBs)}</div>
                        <div class="registro-monto">$${formatearNumero(reg.montoUsd)}</div>
                        <div style="color: #6c757d; font-size: 12px;">Tasa: ${formatearNumero(reg.tasa)}</div>
                    </div>
                </div>
            `).reverse().join('');
        }

        document.getElementById('pagoForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const monto = parseFloat(document.getElementById('monto').value);
            const tasa = parseFloat(document.getElementById('tasa').value);
            const descripcion = document.getElementById('descripcion').value;
            
            if (isNaN(monto) || isNaN(tasa)) {
                alert('Por favor ingresa números válidos');
                return;
            }
            
            let montoBs, montoUsd;
            
            if (tipoActual === 'compra') {
                montoBs = monto;
                montoUsd = monto / tasa;
            } else {
                montoUsd = monto;
                montoBs = monto * tasa;
            }
            
            const nuevoRegistro = {
                fecha: new Date().toISOString(),
                tipo: tipoActual,
                descripcion: descripcion,
                montoBs: montoBs,
                montoUsd: montoUsd,
                tasa: tasa
            };
            
            registros.push(nuevoRegistro);
            localStorage.setItem('registrosPagos', JSON.stringify(registros));
            
            document.getElementById('monto').value = '';
            document.getElementById('tasa').value = '';
            document.getElementById('descripcion').value = '';
            document.getElementById('calcPreview').style.display = 'none';
            document.getElementById('descripcion').focus();
            
            actualizarTotales();
            renderizarHistorial();
        });

        function resetearDatos() {
            if (confirm('¿Estás seguro de que quieres resetear todos los datos? Esta acción no se puede deshacer.')) {
                registros = [];
                localStorage.setItem('registrosPagos', JSON.stringify(registros));
                actualizarTotales();
                renderizarHistorial();
            }
        }

        actualizarTotales();
        renderizarHistorial();
    </script>
</body>
</html>
